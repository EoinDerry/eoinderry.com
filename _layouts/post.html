---
layout: default
---

<article class="article-page">
  <div class="post-meta">
    <span class="article-badge {{ page.badge-class }}">{{ page.badge | default: "CCNA" }}</span>
    <span>{{ page.date | date: "%d %B %Y" }}</span>
    <span>{{ page.read-time | default: "5" }} min read</span>
  </div>
  <h1>{{ page.title }}</h1>
  {{ content }}
</article>
