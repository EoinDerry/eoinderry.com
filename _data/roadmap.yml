# ------------------------------------------------------------------
# The Excel path — six stages from first spreadsheet to power user.
# Each stage becomes a node on the /roadmap/ page. Articles attach
# themselves to a stage via `domain: <id>` in their front matter.
# Edit topic lists freely — the page rebuilds itself.
# ------------------------------------------------------------------

- id: foundations
  number: "01"
  title: Foundations
  level: Beginner
  blurb: >-
    The habits that make everything else easy — how cells, ranges and
    references really work, and the small set of moves you'll use ten
    thousand times.
  topics:
    - Cells, ranges and the grid mindset
    - Relative vs absolute references — the $ sign, demystified
    - Basic formulas — SUM, AVERAGE, MIN, MAX, COUNT
    - The fill handle and copy-down logic
    - Number formats vs the value underneath
    - Keyboard habits that pay for themselves
    - Freeze panes, split view and navigating big sheets

- id: working-with-data
  number: "02"
  title: Working with data
  level: Beginner → improver
  blurb: >-
    Real spreadsheets start as someone else's mess. This stage is about
    taming it — structuring lists properly and cleaning imported data
    without touching it by hand.
  topics:
    - Format as Table — the feature that changes everything
    - Sorting and filtering without wrecking your data
    - Cleaning text — TRIM, CLEAN and PROPER
    - Numbers and dates stored as text (and how to fix them)
    - Text to Columns and Flash Fill
    - Removing duplicates safely
    - Paste Special — values, transpose and the multiply trick

- id: formulas
  number: "03"
  title: Formulas that think
  level: Improver
  blurb: >-
    Where Excel stops being a calculator and starts answering
    questions — conditions, criteria and text logic that do the
    thinking for you.
  topics:
    - IF, IFS and nested logic done cleanly
    - SUMIFS, COUNTIFS and AVERAGEIFS
    - Text functions — LEFT, RIGHT, MID, TEXTBEFORE, TEXTAFTER
    - Working with dates — TODAY, EOMONTH, NETWORKDAYS
    - Error handling with IFERROR and IFNA
    - Naming ranges so formulas read like sentences

- id: lookups
  number: "04"
  title: Lookups & joining data
  level: Improver → advanced
  blurb: >-
    The skill that separates users from power users — pulling the
    right value from another table, reliably, every time.
  topics:
    - XLOOKUP — the lookup you should learn first
    - Why VLOOKUP breaks (and when you'll still meet it)
    - INDEX and MATCH for full control
    - Two-way lookups and lookup keys
    - Matching messy keys between tables
    - Spilled ranges and the # operator

- id: analysis
  number: "05"
  title: Analysis & reporting
  level: Advanced
  blurb: >-
    Turning a clean table into insight someone can act on —
    PivotTables, charts that tell the truth, and reports that update
    themselves.
  topics:
    - PivotTables from first principles
    - Grouping, slicers and pivot layouts
    - Charts — choosing the right one, formatting it honestly
    - Conditional formatting that highlights, not decorates
    - Building a one-page dashboard
    - Sharing workbooks without breaking them

- id: power-tools
  number: "06"
  title: Power tools & automation
  level: Power user
  blurb: >-
    The modern engine room — refreshable imports, formulas that spill,
    and the first steps into automating the boring parts entirely.
  topics:
    - Power Query — import, clean and refresh with one click
    - Dynamic arrays — FILTER, SORT, UNIQUE
    - LET and LAMBDA — formulas you can read
    - Data validation and bulletproof inputs
    - Recording your first macro
    - When to leave Excel (and what for)
