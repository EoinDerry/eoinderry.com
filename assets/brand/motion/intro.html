<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: "Bricolage";
    src: url("bricolage.ttf") format("truetype");
    font-weight: 600;
  }
  @font-face {
    font-family: "PlexMono";
    src: url("plexmono.ttf") format("truetype");
  }
  html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; }
  body.dark { background: #070b12; }
  body.alpha { background: transparent; }
  #stage { position: relative; width: 1920px; height: 1080px; }
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 65% 55% at 50% 42%, rgba(53,224,208,0.05), transparent 60%);
  }
  body.alpha .vignette { display: none; }
  svg#mark { position: absolute; left: 0; top: 0; }
  #word {
    position: absolute;
    top: 762px; left: 0; right: 0;
    display: flex; justify-content: center;
    font-family: "Bricolage", sans-serif;
    font-size: 96px; font-weight: 600;
    letter-spacing: -2px;
    color: #e8edf4;
  }
  #wordinner { display: flex; align-items: baseline; white-space: pre; }
  #w2 { color: #5c6a7d; }
  #cursor {
    width: 10px; height: 74px;
    background: #35e0d0;
    margin-left: 6px;
    align-self: center;
  }
  #tagline {
    position: absolute;
    top: 916px; left: 0; right: 0;
    text-align: center;
    font-family: "PlexMono", monospace;
    font-size: 30px;
    letter-spacing: 6px;
    color: #94a1b3;
  }
</style>
</head>
<body class="dark">
<div id="stage">
  <div class="vignette"></div>
  <svg id="mark" width="1920" height="1080" viewBox="0 0 1920 1080">
    <defs>
      <filter id="pglow" x="-200%" y="-200%" width="500%" height="500%">
        <feGaussianBlur stdDeviation="9"/>
      </filter>
    </defs>
    <!-- mark: viewBox units 104x82 scaled 5.3, placed so mark centre sits at (960, 452) -->
    <g id="root">
      <g id="lg" transform="translate(684.4, 234.7) scale(5.3)">
        <g fill="none" stroke="#e8edf4" stroke-width="7" stroke-linecap="round">
          <path id="crossbar" d="M10 50 H54"/>
          <path id="ebowl" d="M54 50 A22 22 0 1 0 52.4 58.2"/>
          <path id="dbowl" d="M94 37.35 A22 22 0 1 0 94 62.65"/>
          <path id="dstem" d="M94 10 V72"/>
        </g>
        <g id="nodes" fill="#e8edf4">
          <circle class="nd" data-t="0.20" cx="10" cy="50" r="6.5"/>
          <circle class="nd" data-t="0.40" cx="54" cy="50" r="6.5"/>
          <circle class="nd" data-t="0.60" cx="94" cy="37.35" r="6.5"/>
          <circle class="nd" data-t="0.75" cx="94" cy="10" r="6.5"/>
          <circle class="nd" data-t="0.90" cx="94" cy="72" r="6.5"/>
        </g>
        <g id="pings" fill="none" stroke="#35e0d0"></g>
        <g id="packetg">
          <circle id="packethalo" r="11" fill="#35e0d0" opacity="0" filter="url(#pglow)"/>
          <circle id="packet" r="5.5" fill="#35e0d0" opacity="0"/>
        </g>
        <circle id="dockring" fill="none" stroke="#35e0d0" opacity="0"/>
      </g>
    </g>
  </svg>
  <div id="word"><div id="wordinner"><span id="w1"></span><span id="w2"></span><span id="cursor"></span></div></div>
  <div id="tagline">Networks, taught properly.</div>
</div>

<script>
(function () {
  var NAME = "eoinderry", TLD = ".com";
  var FULL = NAME + TLD;

  /* easings */
  function clamp01(x){ return x < 0 ? 0 : x > 1 ? 1 : x; }
  function easeOutCubic(x){ return 1 - Math.pow(1 - x, 3); }
  function easeInOutCubic(x){ return x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3)/2; }
  function backOut(x){ var c1 = 1.35, c3 = c1 + 1; return 1 + c3*Math.pow(x-1,3) + c1*Math.pow(x-1,2); }

  /* paths & draw-on */
  var paths = [
    { el: document.getElementById("crossbar"), t0: 0.45, dur: 0.50 },
    { el: document.getElementById("ebowl"),    t0: 0.65, dur: 0.95 },
    { el: document.getElementById("dbowl"),    t0: 0.80, dur: 0.80 },
    { el: document.getElementById("dstem"),    t0: 0.95, dur: 0.55 }
  ];
  paths.forEach(function (p) {
    p.len = p.el.getTotalLength();
    p.el.setAttribute("stroke-dasharray", p.len);
  });

  var nodes = Array.prototype.slice.call(document.querySelectorAll(".nd"));
  var pingsG = document.getElementById("pings");
  // one ping ring per node, same schedule
  var pings = nodes.map(function (n) {
    var c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", n.getAttribute("cx"));
    c.setAttribute("cy", n.getAttribute("cy"));
    c.setAttribute("stroke-width", "1.6");
    c.setAttribute("opacity", "0");
    pingsG.appendChild(c);
    return { el: c, t0: parseFloat(n.getAttribute("data-t")) };
  });

  var packet = document.getElementById("packet");
  var halo = document.getElementById("packethalo");
  var dockring = document.getElementById("dockring");
  var lg = document.getElementById("root");
  var w1 = document.getElementById("w1"), w2 = document.getElementById("w2");
  var cursor = document.getElementById("cursor");
  var wordinner = document.getElementById("wordinner");
  var tagline = document.getElementById("tagline");

  /* fix wordmark container width so type-on doesn't re-centre */
  function lockWordWidth() {
    w1.textContent = NAME; w2.textContent = TLD;
    var w = wordinner.getBoundingClientRect().width;
    wordinner.style.width = Math.ceil(w) + "px";
    w1.textContent = ""; w2.textContent = "";
  }

  /* packet path: crossbar (10,50)->(54,50), then orbit e-ring to dock at 55deg */
  var CX = 32, CY = 50, R = 22;
  var ORBIT_END = -305 * Math.PI / 180; /* == +55deg, one CCW lap */
  function packetPos(t) {
    if (t < 1.55) return null;
    if (t < 1.95) {
      var p = easeInOutCubic(clamp01((t - 1.55) / 0.40));
      return { x: 10 + 44 * p, y: 50 };
    }
    var q = easeOutCubic(clamp01((t - 1.95) / 1.10));
    var th = ORBIT_END * q;
    return { x: CX + R * Math.cos(th), y: CY + R * Math.sin(th) };
  }

  window.SEEK = function (t) {
    /* global settle scale around mark centre (960, 452) */
    var gs = 1.045 - 0.045 * easeOutCubic(clamp01(t / 3.2));
    lg.setAttribute("transform",
      "translate(960 452) scale(" + gs.toFixed(5) + ") translate(-960 -452)");

    /* nodes pop */
    nodes.forEach(function (n) {
      var t0 = parseFloat(n.getAttribute("data-t"));
      var p = clamp01((t - t0) / 0.35);
      var s = p <= 0 ? 0 : backOut(p);
      var cx = n.getAttribute("cx"), cy = n.getAttribute("cy");
      n.setAttribute("transform",
        "translate(" + cx + " " + cy + ") scale(" + Math.max(0, s).toFixed(4) + ") translate(-" + cx + " -" + cy + ")");
    });

    /* sonar pings */
    pings.forEach(function (pg) {
      var p = clamp01((t - pg.t0) / 0.65);
      if (p <= 0 || p >= 1) { pg.el.setAttribute("opacity", "0"); return; }
      pg.el.setAttribute("r", (6.5 + 18 * easeOutCubic(p)).toFixed(2));
      pg.el.setAttribute("opacity", (0.45 * (1 - p)).toFixed(3));
    });

    /* links draw on */
    paths.forEach(function (p) {
      var q = easeInOutCubic(clamp01((t - p.t0) / p.dur));
      p.el.setAttribute("stroke-dashoffset", (p.len * (1 - q)).toFixed(2));
      p.el.setAttribute("opacity", q > 0 ? 1 : 0);
    });

    /* packet */
    var pos = packetPos(t);
    if (pos) {
      var fade = clamp01((t - 1.55) / 0.12);
      packet.setAttribute("opacity", fade.toFixed(3));
      halo.setAttribute("opacity", (0.45 * fade).toFixed(3));
      packet.setAttribute("cx", pos.x.toFixed(3)); packet.setAttribute("cy", pos.y.toFixed(3));
      halo.setAttribute("cx", pos.x.toFixed(3)); halo.setAttribute("cy", pos.y.toFixed(3));
    } else {
      packet.setAttribute("opacity", "0");
      halo.setAttribute("opacity", "0");
    }

    /* dock pulse at journey's end */
    var dp = clamp01((t - 3.05) / 0.55);
    if (dp > 0 && dp < 1) {
      dockring.setAttribute("cx", "44.62"); dockring.setAttribute("cy", "68.02");
      dockring.setAttribute("r", (5.5 + 15 * easeOutCubic(dp)).toFixed(2));
      dockring.setAttribute("stroke-width", "1.4");
      dockring.setAttribute("opacity", (0.5 * (1 - dp)).toFixed(3));
    } else {
      dockring.setAttribute("opacity", "0");
    }

    /* wordmark type-on */
    var T0 = 2.55, CPS = 0.055;
    var chars = Math.max(0, Math.min(FULL.length, Math.floor((t - T0) / CPS) + (t >= T0 ? 1 : 0)));
    var shown = FULL.slice(0, chars);
    w1.textContent = shown.slice(0, NAME.length);
    w2.textContent = shown.length > NAME.length ? shown.slice(NAME.length) : "";

    /* cursor: appears just before typing, blinks, fades after */
    var cOn = t >= 2.42 && t <= 3.75;
    var blink = (Math.floor(t / 0.38) % 2) === 0;
    var doneTyping = chars >= FULL.length;
    var cOpacity = !cOn ? 0 : (!doneTyping ? 1 : (blink ? 1 : 0));
    if (t > 3.45) cOpacity *= clamp01((3.75 - t) / 0.30);
    cursor.style.opacity = cOpacity;

    /* tagline */
    var tg = easeOutCubic(clamp01((t - 3.35) / 0.50));
    tagline.style.opacity = tg;
    tagline.style.transform = "translateY(" + (14 * (1 - tg)).toFixed(2) + "px)";
  };

  window.READY = document.fonts.ready.then(function () {
    lockWordWidth();
    window.SEEK(0);
    return true;
  });
})();
</script>
</body>
</html>
